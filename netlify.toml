# Netlify config for the Firas AI EDGE version.
# The static frontend (index.html / app.js / styles.css / firebase-config.js) is
# served from the repo root; ONE edge function owns all /api/* routes
# (netlify/edge-functions/api.js). The original server.mjs is unused by Netlify —
# this deploy is driven entirely by the edge function + static files.

[build]
  publish = "."
  command = ""            # no build step (vanilla, zero-dependency frontend)

[[edge_functions]]
  path = "/api/*"
  function = "api"

# Firebase auth proxy: serve the Google sign-in handler from OUR OWN domain so the auth
# flow is FIRST-PARTY. This is what makes "Continue with Google" work in Safari — its
# tracking prevention (ITP) blocks the cross-domain firebaseapp.com handler. firebase-config.js
# sets authDomain to this site's own host; these rewrites forward the handler to Firebase.
[[redirects]]
  from = "/__/auth/*"
  to = "https://firas-ai.firebaseapp.com/__/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/__/firebase/*"
  to = "https://firas-ai.firebaseapp.com/__/firebase/:splat"
  status = 200
  force = true

# Static files serve automatically for every non-/api path — all routes are real
# files (/, /index.html, /app.js, /styles.css, /firebase-config.js). The edge
# function intercepts every /api/* request and returns 404 for unknown api paths.

# ── Caching ──────────────────────────────────────────────────────────────────
# HTML always revalidates; JS/CSS serve instantly from browser cache for 5 min
# and refresh in the background (stale-while-revalidate) — repeat visits boot
# with zero asset round-trips, and a deploy fully propagates within minutes.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=86400"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=86400"

# ── Security headers (all pages) ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── Hide non-frontend repo files from the public deploy (publish = ".") ──────
# Backend source, docs and config are not secrets by themselves, but exposing
# them maps the attack surface for free. Serve 404 for all of them.
[[redirects]]
  from = "/server.mjs"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.md"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.toml"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.yaml"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/package.json"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/package-lock.json"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/.env*"
  to = "/index.html"
  status = 404
  force = true
